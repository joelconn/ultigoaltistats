th { color: #999; font-weight: 700; cursor: pointer; user-select: none; font-size: 11px; text-transform: uppercase; }
th:hover { color: #26ff66; }
th.sorted::after { content: ' \25BC'; }
th.sorted-asc::after { content: ' \25B2'; }
tbody tr:hover { background: #111; }
td.editable { cursor: text; }
td.editable:focus { outline: 1px solid #26ff66; background: #0a1a0a; }
td.edited { color: #ffd400; }
.table-wrap { overflow-x: auto; border: 1px solid #222; border-radius: 10px; }
.toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
button.action { background: #1a1a1a; color: #26ff66; border: 1px solid #26ff66; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer; }
button.action:hover { background: #102; }
.hint { color: #777; font-size: 11px; margin-bottom: 10px; }

const STORE_KEY = "ultigoaltistats_edits_v1";
function loadEdits() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (e) { return {}; } }
function saveEdits(edits) { localStorage.setItem(STORE_KEY, JSON.stringify(edits)); }
let EDITS = loadEdits();

const NUMERIC_COLUMNS = [
  ["goals","Goals"], ["assists","Ast"], ["blocks","Ds"], ["drops","Drop"],
  ["throwaways","T/A"], ["stalls","Stall"], ["plusMinus","+/-"],
  ["oPlusMinus","O+/-"], ["dPlusMinus","D+/-"], ["callahansCaught","Cal C"],
  ["callahansThrown","Cal T"], ["twoPointGoals","2PT G"], ["twoPointAssists","2PT A"],
  ["pulls","Pulls"], ["pointsPlayed","Pts"], ["minutesPlayed","Min"]
];

function editKey(scope, rowId, field) { return scope + "|" + rowId + "|" + field; }

function cellValue(scope, row, field) {
  const k = editKey(scope, row.id, field);
  if (Object.prototype.hasOwnProperty.call(EDITS, k)) return EDITS[k];
  return row[field];
}

function buildTable(scope, rows) {
  const wrap = document.createElement("div");
  wrap.className = "table-wrap";
  const table = document.createElement("table");
  const thead = document.createElement("thead");
  const headRow = document.createElement("tr");
  const nameTh = document.createElement("th");
  nameTh.textContent = "Player";
  headRow.appendChild(nameTh);
  NUMERIC_COLUMNS.forEach(([field, label]) => {
    const th = document.createElement("th");
    th.textContent = label;
    th.dataset.field = field;
    th.addEventListener("click", () => sortTable(scope, table, field));
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = document.createElement("tbody");
  tbody.dataset.scope = scope;
  renderRows(scope, tbody, rows);
  table.appendChild(tbody);
  table._rows = rows;
  table._scope = scope;
  wrap.appendChild(table);
  return wrap;
}

function renderRows(scope, tbody, rows) {
  tbody.innerHTML = "";
  rows.forEach(row => {
    const tr = document.createElement("tr");
    const nameTd = document.createElement("td");
    nameTd.textContent = row.number ? ("#" + row.number + " " + row.name) : row.name;
    tr.appendChild(nameTd);
    NUMERIC_COLUMNS.forEach(([field]) => {
      const td = document.createElement("td");
      const val = cellValue(scope, row, field);
      td.textContent = val;
      td.dataset.field = field;
      td.dataset.rowId = row.id;
      const k = editKey(scope, row.id, field);
      if (Object.prototype.hasOwnProperty.call(EDITS, k)) td.classList.add("edited");
      if (field !== "minutesPlayed") {
        td.contentEditable = "true";
        td.classList.add("editable");
        td.addEventListener("blur", () => {
          const num = parseFloat(td.textContent);
          if (!isNaN(num)) {
            EDITS[editKey(scope, row.id, field)] = num;
            saveEdits(EDITS);
            td.classList.add("edited");
          } else {
            td.textContent = val;
          }
        });
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

let sortState = {};
function sortTable(scope, table, field) {
  const key = scope + "_" + field;
  const dir = sortState[key] === "asc" ? "desc" : "asc";
  sortState = {}; sortState[key] = dir;
  const rows = table._rows.slice().sort((a, b) => {
    const av = parseFloat(cellValue(scope, a, field)) || 0;
    const bv = parseFloat(cellValue(scope, b, field)) || 0;
    return dir === "asc" ? av - bv : bv - av;
  });
  table.querySelectorAll("th").forEach(th => th.classList.remove("sorted", "sorted-asc"));
  const th = table.querySelector('th[data-field="' + field + '"]');
  if (th) th.classList.add(dir === "asc" ? "sorted-asc" : "sorted");
  renderRows(scope, table.querySelector("tbody"), rows);
}

function exportEditedCSV(scope, rows, filename) {
  const header = ["Player"].concat(NUMERIC_COLUMNS.map(c => c[1]));
  const lines = [header.join(",")];
  rows.forEach(row => {
    const line = [row.number ? ("#" + row.number + " " + row.name) : row.name];
    NUMERIC_COLUMNS.forEach(([field]) => line.push(cellValue(scope, row, field)));
    lines.push(line.join(","));
  });
  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function summaryCards(items) {
  const wrap = document.createElement("div");
  wrap.className = "summary-cards";
  items.forEach(([label, value]) => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = '<div class="label"></div><div class="value"></div>';
    card.querySelector(".label").textContent = label;
    card.querySelector(".value").textContent = value;
    wrap.appendChild(card);
  });
  return wrap;
}

    ["Points For", t.pointsFor], ["Points Against", t.pointsAgainst],
    ["Differential", (t.pointsFor - t.pointsAgainst >= 0 ? "+" : "") + (t.pointsFor - t.pointsAgainst)]
  ]));
  if (DATA.tournamentSummaries.length) {
    const h2 = document.createElement("h3");
    h2.textContent = "By Tournament";
    h2.style.marginTop = "20px";
    teamPanel.appendChild(h2);
    const wrap = document.createElement("div");
    wrap.className = "table-wrap";
    const table = document.createElement("table");
    table.innerHTML = "<thead><tr><th>Tournament</th><th>GP</th><th>W</th><th>L</th><th>T</th><th>PF</th><th>PA</th></tr></thead>";
    const tbody = document.createElement("tbody");
    DATA.tournamentSummaries.forEach(ts => {
      const tr = document.createElement("tr");
      tr.innerHTML = "<td>" + ts.name + "</td><td>" + ts.gamesPlayed + "</td><td>" + ts.wins + "</td><td>" + ts.losses + "</td><td>" + ts.ties + "</td><td>" + ts.pointsFor + "</td><td>" + ts.pointsAgainst + "</td>";
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    teamPanel.appendChild(wrap);
  }
  panels.team = teamPanel;
  app.appendChild(teamPanel);
}

buildApp();
</script>
</body>
</html>
