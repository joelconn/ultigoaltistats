function emptyRow(player) {
  return {
    id: player.id, name: player.name, number: player.number,
    goals: 0, assists: 0, catches: 0, completions: 0, drops: 0, throwaways: 0,
    stalls: 0, blocks: 0, pulls: 0, pullsIB: 0, pullsOOB: 0, totalHangTime: 0,
    greatests: 0, callahansCaught: 0, callahansThrown: 0,
    twoPointGoals: 0, twoPointAssists: 0, twoPointTurnovers: 0, assistAttempts: 0, scoredOn: 0,
    pointsPlayed: 0, oPoints: 0, dPoints: 0,
    plusMinus: 0, oPlusMinus: 0, dPlusMinus: 0
  };
}

function credit(stats, id, amount, offense) {
  if (!id || !stats[id]) return;
  stats[id].plusMinus += amount;
  if (offense) stats[id].oPlusMinus += amount; else stats[id].dPlusMinus += amount;
}

function computeBoxScore(roster, points) {
  const stats = {};
  roster.forEach(p => { stats[p.id] = emptyRow(p); });

  points.forEach(point => {
    point.lineup.forEach(id => {
      if (!stats[id]) return;
      stats[id].pointsPlayed += 1;
      if (point.startingPossession === "offense") stats[id].oPoints += 1;
      else stats[id].dPoints += 1;
    });

    point.plays.forEach(e => {
      const p1 = e.player1Id, p2 = e.player2Id;
      switch (e.type) {
        case "pull":
          if (p1 && stats[p1]) { stats[p1].pulls += 1; if (e.hangTime) stats[p1].totalHangTime += e.hangTime; }
          break;
        case "pullCaught":
          if (p1 && stats[p1]) { stats[p1].pullsIB += 1; if (e.hangTime) stats[p1].totalHangTime += e.hangTime; }
          break;
        case "pullOOB":
          if (p1 && stats[p1]) { stats[p1].pullsOOB += 1; if (e.hangTime) stats[p1].totalHangTime += e.hangTime; }
          break;
        case "pass":
          if (p1 && stats[p1]) stats[p1].completions += 1;
          if (p2 && stats[p2]) stats[p2].catches += 1;
          break;
        case "goal":
          if (p1 && stats[p1]) { stats[p1].goals += 1; stats[p1].catches += 1; }
          if (p2 && stats[p2]) { stats[p2].assists += 1; stats[p2].completions += 1; }
          credit(stats, p1, 1, true); credit(stats, p2, 1, true);
          break;
        case "twoPointGoal":
          if (p1 && stats[p1]) { stats[p1].twoPointGoals += 1; stats[p1].catches += 1; }
          if (p2 && stats[p2]) { stats[p2].twoPointAssists += 1; stats[p2].completions += 1; }
          credit(stats, p1, 2, true); credit(stats, p2, 2, true);
          break;
        case "drop":
          if (p1 && stats[p1]) stats[p1].drops += 1;
          credit(stats, p1, -1, true);
          break;
        case "throwaway":
          if (p1 && stats[p1]) stats[p1].throwaways += 1;
          credit(stats, p1, -1, true);
          break;
        case "twoPointThrowaway":
          if (p1 && stats[p1]) { stats[p1].throwaways += 1; stats[p1].twoPointTurnovers += 1; }
          credit(stats, p1, -1, true);
          break;
        case "stall":
          if (p1 && stats[p1]) stats[p1].stalls += 1;
          credit(stats, p1, -1, true);
          break;
        case "greatest":
          if (p1 && stats[p1]) stats[p1].greatests += 1;
          break;
        case "callahanCaught":
          if (p1 && stats[p1]) { stats[p1].callahansCaught += 1; stats[p1].catches += 1; }
          credit(stats, p1, 2, false);
          break;
        case "callahanThrown":
          if (p1 && stats[p1]) { stats[p1].callahansThrown += 1; stats[p1].throwaways += 1; }
          credit(stats, p1, -1, true);
          break;
        case "block":
          if (p1 && stats[p1]) stats[p1].blocks += 1;
          credit(stats, p1, 1, false);
          break;
        case "scoredOnTwoPoint":
          point.lineup.forEach(id => { if (stats[id]) stats[id].scoredOn += 1; });
          break;
        case "assistAttempt":
          if (p1 && stats[p1]) stats[p1].assistAttempts += 1;
          credit(stats, p1, -1, true);
          break;
        default: break;
      }
    });
  });

  return Object.values(stats);
}

// MARK: - Derived stats (mirrors PlayerStats computed properties)

function computeDerived(row) {
  // +/- is re-derived from the (possibly edited) raw counting stats every
  // time, instead of staying frozen at whatever the event replay produced
  // — this is what makes editing "goals" actually move "+/-" live.
  // NOTE: `throwaways` already includes twoPointThrowaway- and
  // callahanThrown-attributed throws (mirrors StatsCalculator in Swift,
  // where one event increments both fields but credits -1 only once) —
  // don't subtract those again or it double-counts.
  row.oPlusMinus = row.goals + row.assists
    + row.twoPointGoals * 2 + row.twoPointAssists * 2
    - row.throwaways - row.drops - row.stalls - row.assistAttempts;
  row.dPlusMinus = row.blocks + row.callahansCaught * 2;
  row.plusMinus = row.oPlusMinus + row.dPlusMinus;

  row.touches = row.catches + row.goals + row.greatests;
  row.totalPulls = row.pullsOOB + row.pullsIB;
  const passAttempts = row.completions + row.throwaways + row.stalls + row.callahansThrown;
  row.passingPercentage = passAttempts > 0 ? Math.round(row.completions / passAttempts * 100) : null;
  const catchAttempts = row.catches + row.drops;
  row.catchingPercentage = catchAttempts > 0 ? Math.round(row.catches / catchAttempts * 100) : null;
  row.averagePullHangtime = row.totalPulls > 0 ? Math.round(row.totalHangTime / row.totalPulls * 10) / 10 : null;
  row.oEfficiency = row.oPoints > 0 ? Math.round((row.goals + row.assists) / row.oPoints * 100) / 100 : null;
  row.dEfficiency = row.dPoints > 0 ? Math.round(row.blocks / row.dPoints * 100) / 100 : null;
  row.ppGoals = row.pointsPlayed > 0 ? Math.round(row.goals / row.pointsPlayed * 100) / 100 : 0;
  row.ppAssists = row.pointsPlayed > 0 ? Math.round(row.assists / row.pointsPlayed * 100) / 100 : 0;
  row.ppDs = row.pointsPlayed > 0 ? Math.round(row.blocks / row.pointsPlayed * 100) / 100 : 0;
  row.ppThrowaways = row.pointsPlayed > 0 ? Math.round(row.throwaways / row.pointsPlayed * 100) / 100 : 0;
}

function formatValue(v) {
  if (v === null || v === undefined) return "*";
  return String(v);
}

// MARK: - Scope resolution (which points feed a given table)

function getPoints(scope) {
  if (scope === "lifetime") return DATA.games.flatMap(g => g.points);
  if (scope.indexOf("tournament_") === 0) {
    const name = scope.slice("tournament_".length);
    return DATA.games.filter(g => g.tournament === name).flatMap(g => g.points);
  }
  if (scope.indexOf("game_") === 0) {
    const id = scope.slice("game_".length);
    const g = DATA.games.find(x => x.id === id);
    return g ? g.points : [];
  }
  return [];
}

function getRows(scope) {
  const rows = computeBoxScore(DATA.roster, getPoints(scope));
  rows.forEach(row => {
    COLUMNS.forEach(([field, , , , editable]) => {
      if (!editable) return;
      const k = editKey(scope, row.id, field);
      if (Object.prototype.hasOwnProperty.call(EDITS, k)) row[field] = EDITS[k];
    });
    computeDerived(row);
  });
  return rows.filter(r => r.pointsPlayed > 0).sort((a, b) => a.name.localeCompare(b.name));
}

// MARK: - Advanced team metrics (point-sequence analysis; non-Vic-Mode points only)

function computeTeamMetrics(points) {
  let oPointsCount = 0, oPointsScored = 0;
  let blocksTotal = 0, blocksConverted = 0;
  let dirtyHolds = 0, totalScoredPoints = 0, pointsAnalyzed = 0;

  points.forEach(point => {
    if (point.plays.some(p => p.actingLine)) return; // skip Vic Mode points — no fixed "us"
    pointsAnalyzed += 1;
    if (point.startingPossession === "offense") oPointsCount += 1;

    let weHadDisc = point.startingPossession === "offense";
    let weTurnedItOver = false, weReclaimed = false, weScored = false;
    let blocksThisPoint = 0;

    point.plays.forEach(play => {
      switch (play.type) {
        case "goal": case "twoPointGoal": case "callahanCaught":
          weScored = true; break;
        case "theyScored": case "scoredOnTwoPoint": case "callahanThrown":
          weScored = false; break;
        case "drop": case "throwaway": case "twoPointThrowaway":
        case "stall": case "assistAttempt":
          if (weHadDisc) { weTurnedItOver = true; weHadDisc = false; }
          break;
        case "block":
          blocksTotal += 1;
          blocksThisPoint += 1;
          if (!weHadDisc) { weHadDisc = true; if (weTurnedItOver) weReclaimed = true; }
          break;
        case "theyTurnedItOver":
          weHadDisc = true; break;
        default: break;
      }
    });

    if (point.startingPossession === "offense" && weScored) oPointsScored += 1;
    if (weScored) {
      totalScoredPoints += 1;
      if (weTurnedItOver && weReclaimed) dirtyHolds += 1;
      blocksConverted += blocksThisPoint;
    }
  });

  return {
    offensiveEfficiency: oPointsCount > 0 ? Math.round(oPointsScored / oPointsCount * 1000) / 10 : null,
    oPointsCount, oPointsScored,
    conversionPct: blocksTotal > 0 ? Math.round(blocksConverted / blocksTotal * 1000) / 10 : null,
    conversionCount: blocksConverted, blocksTotal,
    dirtyHolds, totalScoredPoints, pointsAnalyzed
  };
}

// MARK: - Thrown-To chart (ports ThrownToChartView's bubble-pack algorithm)

function computeThrownToBubbles(points, throwerId, roster) {
  const catchMap = {}, goalMap = {}, dropMap = {};
  let otherTeamCount = 0;

  points.forEach(point => {
    const plays = point.plays;
    plays.forEach((event, i) => {
      switch (event.type) {
        case "pass":
          if (event.player1Id === throwerId && event.player2Id) {
            catchMap[event.player2Id] = (catchMap[event.player2Id] || 0) + 1;
          }
          break;
        case "goal": case "twoPointGoal":
          if (event.player2Id === throwerId && event.player1Id) {
            goalMap[event.player1Id] = (goalMap[event.player1Id] || 0) + 1;
          }
          break;
        case "drop":
          if (event.player1Id) {
            const dropper = event.player1Id;
            let j = i - 1;
            while (j >= 0) {
              const prev = plays[j];
              if (prev.type === "pass" && prev.player2Id === dropper) {
                if (prev.player1Id === throwerId) dropMap[dropper] = (dropMap[dropper] || 0) + 1;
                break;
              }
              j -= 1;
            }
          }
          break;
        case "throwaway": case "twoPointThrowaway": case "stall":
        case "callahanThrown": case "assistAttempt":
          if (event.player1Id === throwerId) otherTeamCount += 1;
          break;
        default: break;
      }
    });
  });

  const ids = new Set([].concat(Object.keys(catchMap), Object.keys(goalMap), Object.keys(dropMap)));
  const result = [];
  ids.forEach(rid => {
    const player = roster.find(p => p.id === rid);
    const name = player ? player.name : "?";
    const c = catchMap[rid] || 0, g = goalMap[rid] || 0, d = dropMap[rid] || 0;
    if (c + g + d > 0) result.push({ name: name, completions: c, goals: g, drops: d, isOtherTeam: false, total: c + g + d });
  });
  if (otherTeamCount > 0) {
    result.push({ name: "Other Team", completions: otherTeamCount, goals: 0, drops: 0, isOtherTeam: true, total: otherTeamCount });
  }
  result.sort((a, b) => b.total - a.total);
  return result;
}

function bubbleColor(b) {
  if (b.isOtherTeam) return "#FF9E00";
  if (b.goals > 0 && b.goals >= b.completions && b.goals >= b.drops) return "#26FF66";
  if (b.drops > b.completions && b.drops > b.goals) return "#FF477A";
  return "#8CC747";
}

function bubbleRadius(total, scale, minRadius) {
  return Math.max(minRadius, Math.sqrt(Math.max(1, total)) * scale);
}

function packBubbles(bubbles, width, height) {
  if (width <= 0 || height <= 0) return [];
  const scale = 15;
  const cx = width / 2, cy = height / 2;
  const maxPossibleR = Math.min(width, height) / 2;
  let minRadius;
  if (bubbles.length === 1) minRadius = Math.min(maxPossibleR * 0.6, 70);
  else if (bubbles.length === 2) minRadius = Math.min(maxPossibleR * 0.4, 50);
  else if (bubbles.length === 3) minRadius = Math.min(maxPossibleR * 0.3, 40);
  else minRadius = 24;

  const placed = [];
  bubbles.forEach(bubble => {
    const r = bubbleRadius(bubble.total, scale, minRadius);
    if (placed.length === 0) {
      placed.push({ x: cx, y: cy, r: r, bubble: bubble });
      return;
    }
    let bestX = cx, bestY = cy, bestDist = Infinity, found = false;
    placed.forEach(existing => {
      const gap = existing.r + r + 3;
      for (let ideg = 0; ideg < 360; ideg += 5) {
        const rad = ideg * Math.PI / 180;
        const px = existing.x + gap * Math.cos(rad);
        const py = existing.y + gap * Math.sin(rad);
        if (px - r < 1 || px + r > width - 1 || py - r < 1 || py + r > height - 1) continue;
        const overlaps = placed.some(p => Math.hypot(p.x - px, p.y - py) < p.r + r - 1);
        if (!overlaps) {
          const d = Math.hypot(px - cx, py - cy);
          if (d < bestDist) { bestDist = d; bestX = px; bestY = py; found = true; }
        }
      }
    });
    placed.push({ x: found ? bestX : cx, y: found ? bestY : cy, r: r, bubble: bubble });
  });

  return placed;
}

function buildThrownToLegend() {
  const items = [["Catches", "#8CC747"], ["Goals", "#26FF66"], ["Drops", "#FF477A"], ["Turnovers", "#FF9E00"]];
  const wrap = document.createElement("div");
  wrap.className = "bubble-legend";
  items.forEach(([label, color]) => {
    const span = document.createElement("span");
    const dot = document.createElement("span");
    dot.className = "dot";
    dot.style.background = color;
    span.appendChild(dot);
    span.appendChild(document.createTextNode(label));
    wrap.appendChild(span);
  });
  return wrap;
}

function buildThrownToChart(points, throwerId, roster) {
  const bubbles = computeThrownToBubbles(points, throwerId, roster);
  const container = document.createElement("div");
  container.className = "bubble-chart";

  function render() {
    const width = container.clientWidth;
    container.innerHTML = "";
    if (bubbles.length === 0) {
      const empty = document.createElement("div");
      empty.className = "bubble-empty";
      empty.textContent = "No throwing data recorded";
      container.appendChild(empty);
      return;
    }
    const placed = packBubbles(bubbles, width, 260);
    placed.forEach(p => {
      const el = document.createElement("div");
      el.className = "bubble";
      el.style.width = (p.r * 2) + "px";
      el.style.height = (p.r * 2) + "px";
      el.style.left = (p.x - p.r) + "px";
      el.style.top = (p.y - p.r) + "px";
      el.style.background = bubbleColor(p.bubble);
      const count = document.createElement("div");
      count.className = "bubble-count";
      count.textContent = String(p.bubble.total);
      el.appendChild(count);
      if (p.r > 22) {
        const name = document.createElement("div");
        name.className = "bubble-name";
        name.textContent = p.bubble.name;
        el.appendChild(name);
      }
      container.appendChild(el);
    });
  }

  requestAnimationFrame(render);
  window.addEventListener("resize", render);
  return container;
}

// MARK: - Leaderboard cards

// criteria: array of [field, dir] — dir 1 means higher wins, -1 means
// lower wins. The first entry is the headline stat; later entries only
// matter when every earlier one is exactly tied, and break the tie in
// order. If every criterion is tied, the earlier row wins — rows arrive
// pre-sorted alphabetically, so a total tie just resolves to whoever's
// first by name (deterministic, but not a meaningful ranking).
function findLeader(rows, criteria) {
  let best = null;
  rows.forEach(r => {
    if (typeof r[criteria[0][0]] !== "number") return;
    if (!best) { best = r; return; }
    for (const [field, dir] of criteria) {
      if (r[field] === best[field]) continue;
      if ((r[field] > best[field]) === (dir > 0)) best = r;
      break;
    }
  });
  return best;
}

function leaderCard(title, leader, lines) {
  const card = document.createElement("div");
  card.className = "leader-card";
  const h = document.createElement("div");
  h.className = "leader-title";
  h.textContent = title;
  card.appendChild(h);
  if (!leader) {
    const none = document.createElement("div");
    none.className = "leader-none";
    none.textContent = "—";
    card.appendChild(none);
    return card;
  }
  const name = document.createElement("div");
  name.className = "leader-name";
  name.textContent = leader.name;
  card.appendChild(name);
  lines.forEach(([label, val]) => {
    const line = document.createElement("div");
    line.className = "leader-stat";
    line.textContent = label + ": " + formatValue(val);
    card.appendChild(line);
  });
  return card;
}

function buildLeaderboard(rows) {
  const wrap = document.createElement("div");
  wrap.className = "leaderboard";
  // Secondary stats break ties: fewer D-points for the same blocks
  // (more efficient defender), more assists for the same goals (more
  // involved scorer), fewer points played for the same +/- (more
  // impactful per point), more touches for the same points played
  // (busier while on the field).
  const dLeader = findLeader(rows, [["blocks", 1], ["dPoints", -1]]);
  const oLeader = findLeader(rows, [["goals", 1], ["assists", 1]]);
  const pmLeader = findLeader(rows, [["plusMinus", 1], ["pointsPlayed", -1]]);
  const ptLeader = findLeader(rows, [["pointsPlayed", 1], ["touches", 1]]);
  wrap.appendChild(leaderCard("Defense", dLeader, dLeader ? [["Ds", dLeader.blocks], ["D Points", dLeader.dPoints], ["Pulls", dLeader.pulls]] : []));
  wrap.appendChild(leaderCard("Offense", oLeader, oLeader ? [["Goals", oLeader.goals], ["Assists", oLeader.assists], ["Touches", oLeader.touches]] : []));
  wrap.appendChild(leaderCard("Plus/Minus", pmLeader, pmLeader ? [["+/-", pmLeader.plusMinus], ["O+/-", pmLeader.oPlusMinus], ["D+/-", pmLeader.dPlusMinus]] : []));
  wrap.appendChild(leaderCard("Playing Time", ptLeader, ptLeader ? [["Points Played", ptLeader.pointsPlayed], ["O Points", ptLeader.oPoints], ["D Points", ptLeader.dPoints]] : []));
  return wrap;
}

  COLUMNS.forEach(([field]) => {

  });
  return avg;
}

// MARK: - Table rendering

function buildTable(scope) {
  const wrap = document.createElement("div");
  wrap.className = "table-wrap";
  const table = document.createElement("table");
  wrap.appendChild(table);
  renderTable(table, scope);
  return wrap;
}

function renderTable(table, scope) {
  table.innerHTML = "";
  const thead = document.createElement("thead");
  const headRow = document.createElement("tr");
  const nameTh = document.createElement("th");
  nameTh.textContent = "Player";
  headRow.appendChild(nameTh);
  COLUMNS.forEach(([field, label]) => {
    const th = document.createElement("th");
    th.textContent = label;
    th.dataset.field = field;
    th.addEventListener("click", () => sortTable(table, scope, field));
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);
  table.appendChild(thead);
  table.appendChild(document.createElement("tbody"));
  renderRows(table, scope, getRows(scope));
}

function renderRows(table, scope, rows) {
  table._rows = rows;
  const tbody = table.querySelector("tbody");
  tbody.innerHTML = "";
  rows.forEach(row => {
    const tr = document.createElement("tr");
    const nameTd = document.createElement("td");
    nameTd.textContent = row.number ? ("#" + row.number + " " + row.name) : row.name;
    nameTd.className = "player-link";
    nameTd.addEventListener("click", () => openPlayerDetail(scope, row.id));
    tr.appendChild(nameTd);
    COLUMNS.forEach(([field, , , , editable]) => {
      const td = document.createElement("td");
      td.textContent = formatValue(row[field]);
      const k = editKey(scope, row.id, field);
      if (Object.prototype.hasOwnProperty.call(EDITS, k)) td.classList.add("edited");
      if (editable) {
        td.contentEditable = "true";
        td.classList.add("editable");
        td.addEventListener("blur", () => {
          const num = parseFloat(td.textContent);
          const k2 = editKey(scope, row.id, field);
          if (!isNaN(num)) { EDITS[k2] = num; } else { delete EDITS[k2]; }
          saveEdits(EDITS);
          renderRows(table, scope, getRows(scope));
        });
      } else {
        td.classList.add("computed");
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

let sortState = {};
function sortTable(table, scope, field) {
  const key = scope + "_" + field;
  const dir = sortState[key] === "asc" ? "desc" : "asc";
  sortState = {}; sortState[key] = dir;
  const rows = table._rows.slice().sort((a, b) => {
    const av = (typeof a[field] === "number") ? a[field] : -Infinity;
    const bv = (typeof b[field] === "number") ? b[field] : -Infinity;
    return dir === "asc" ? av - bv : bv - av;
  });
  table.querySelectorAll("th").forEach(th => th.classList.remove("sorted", "sorted-asc"));
  const th = table.querySelector('th[data-field="' + field + '"]');
  if (th) th.classList.add(dir === "asc" ? "sorted-asc" : "sorted");
  renderRows(table, scope, rows);
}

function exportEditedCSV(scope, filename) {
  const rows = getRows(scope);
  const header = ["Player"].concat(COLUMNS.map(c => c[1]));
  const lines = [header.join(",")];
  rows.forEach(row => {
    const line = [row.number ? ("#" + row.number + " " + row.name) : row.name];
    COLUMNS.forEach(([field]) => line.push(formatValue(row[field])));
    lines.push(line.join(","));
  });
  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

}

function buildTeamMetricsSection(points) {
  const m = computeTeamMetrics(points);
  const wrap = document.createElement("div");
  wrap.appendChild(summaryCards([
    ["Offensive Efficiency", m.offensiveEfficiency !== null ? (m.offensiveEfficiency + "%") : "*"],
    ["O-Points Scored", m.oPointsScored + " / " + m.oPointsCount],
    ["D Conversion %", m.conversionPct !== null ? (m.conversionPct + "%") : "*"],
    ["D Conversions", m.conversionCount + " / " + m.blocksTotal],
    ["Dirty Holds", m.dirtyHolds + " / " + m.totalScoredPoints]
  ]));
  const note = document.createElement("div");
  note.className = "hint";
  note.textContent = "Offensive Efficiency: % of points starting on offense that ended in a goal. D Conversion: % of blocks whose point ended in a goal. Dirty Hold: scored a point despite turning it over and getting it back first. Vic Mode points are excluded (no fixed \"us\" team).";
  wrap.appendChild(note);
  return wrap;
}

// MARK: - App shell

function buildApp() {
  const app = document.getElementById("app");

  const header = document.createElement("header");
  header.innerHTML = "<h1></h1><p></p>";
  header.querySelector("h1").textContent = DATA.teamName + " — Stats";
  header.querySelector("p").textContent = "Generated " + DATA.generatedAt + " · edits below are saved in this browser only";
  if (DATA.sheetsURL) {
    const link = document.createElement("a");
    link.href = DATA.sheetsURL;
    link.target = "_blank";
    link.rel = "noopener";
    link.className = "sheets-link";
    link.textContent = "Open editable Google Sheet ↗";
    header.appendChild(link);
  }
  app.appendChild(header);

  const tabs = document.createElement("div");
  tabs.className = "tabs";
  const tabDefs = [["lifetime","Lifetime"], ["tournaments","Tournaments"], ["games","Games"], ["team","Team"]];
  const panels = {};

  tabDefs.forEach(([key, label], i) => {
    const btn = document.createElement("button");
    btn.className = "tab" + (i === 0 ? " active" : "");
    btn.textContent = label;
    btn.addEventListener("click", () => {
      tabs.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      btn.classList.add("active");
      Object.values(panels).forEach(p => p.classList.remove("active"));
      panels[key].classList.add("active");
    });
    tabs.appendChild(btn);
  });
  app.appendChild(tabs);

  // Lifetime panel
  const lifetimePanel = document.createElement("div");
  lifetimePanel.className = "panel active";
  const lifeToolbar = document.createElement("div");
  lifeToolbar.className = "toolbar";
  const lifeExportBtn = document.createElement("button");
  lifeExportBtn.className = "action";
  lifeExportBtn.textContent = "Export Edited CSV";
  lifeExportBtn.addEventListener("click", () => exportEditedCSV("lifetime", "lifetime_stats.csv"));
  lifeToolbar.appendChild(lifeExportBtn);
  lifetimePanel.appendChild(lifeToolbar);
  lifetimePanel.appendChild(buildLeaderboard(getRows("lifetime")));
  lifetimePanel.appendChild(buildLegend());
  const lifeHint = document.createElement("div");
  lifeHint.className = "hint";
  lifeHint.textContent = "Tap a white number to edit it (saved in this browser only) — blue numbers are calculated and update automatically.";
  lifetimePanel.appendChild(lifeHint);
  lifetimePanel.appendChild(buildTable("lifetime"));
  panels.lifetime = lifetimePanel;
  app.appendChild(lifetimePanel);

  // Tournaments panel
  const tournamentsPanel = document.createElement("div");
  tournamentsPanel.className = "panel";
  const tSelect = document.createElement("select");
  DATA.tournamentNames.forEach(name => {
    const opt = document.createElement("option");
    opt.value = name; opt.textContent = name;
    tSelect.appendChild(opt);
  });
  tournamentsPanel.appendChild(tSelect);
  const tTableHolder = document.createElement("div");
  tournamentsPanel.appendChild(tTableHolder);
  function renderTournament() {
    const name = tSelect.value || DATA.tournamentNames[0];
    tTableHolder.innerHTML = "";
    if (!name) return;
    const scope = "tournament_" + name;
    const toolbar = document.createElement("div");
    toolbar.className = "toolbar";
    const btn = document.createElement("button");
    btn.className = "action";
    btn.textContent = "Export Edited CSV";
    btn.addEventListener("click", () => exportEditedCSV(scope, name + "_stats.csv"));
    toolbar.appendChild(btn);
    tTableHolder.appendChild(toolbar);
    tTableHolder.appendChild(buildLeaderboard(getRows(scope)));
    tTableHolder.appendChild(buildLegend());
    tTableHolder.appendChild(buildTable(scope));
  }
  tSelect.addEventListener("change", renderTournament);
  if (DATA.tournamentNames.length) renderTournament();
  panels.tournaments = tournamentsPanel;
  app.appendChild(tournamentsPanel);

  // Games panel
  const gamesPanel = document.createElement("div");
  gamesPanel.className = "panel";
  const gSelect = document.createElement("select");
  DATA.games.slice().reverse().forEach(g => {
    const opt = document.createElement("option");
    opt.value = g.id; opt.textContent = g.label;
    gSelect.appendChild(opt);
  });
  gamesPanel.appendChild(gSelect);
  const gTableHolder = document.createElement("div");
  gamesPanel.appendChild(gTableHolder);
  function renderGame() {
    const g = DATA.games.find(x => x.id === gSelect.value) || DATA.games[DATA.games.length - 1];
    gTableHolder.innerHTML = "";
    if (!g) return;
    const scope = "game_" + g.id;
    const toolbar = document.createElement("div");
    toolbar.className = "toolbar";
    const btn = document.createElement("button");
    btn.className = "action";
    btn.textContent = "Export Edited CSV";
    btn.addEventListener("click", () => exportEditedCSV(scope, g.opponent + "_" + g.date + ".csv"));
    toolbar.appendChild(btn);
    gTableHolder.appendChild(toolbar);
    gTableHolder.appendChild(buildGameTeamStats(g));
    gTableHolder.appendChild(buildLeaderboard(getRows(scope)));
    gTableHolder.appendChild(buildLegend());
    gTableHolder.appendChild(buildTable(scope));
  }
  gSelect.addEventListener("change", renderGame);
  if (DATA.games.length) renderGame();
  panels.games = gamesPanel;
  app.appendChild(gamesPanel);

  // Team panel
  const teamPanel = document.createElement("div");
  teamPanel.className = "panel";
  const t = DATA.team;
  teamPanel.appendChild(summaryCards([
    ["Games", t.gamesPlayed], ["Record", t.wins + "-" + t.losses + "-" + t.ties],
    ["Points For", t.pointsFor], ["Points Against", t.pointsAgainst],
    ["Differential", (t.pointsFor - t.pointsAgainst >= 0 ? "+" : "") + (t.pointsFor - t.pointsAgainst)]
  ]));
  const h2 = document.createElement("h3");
  h2.textContent = "Advanced Metrics";
  h2.style.marginTop = "20px";
  teamPanel.appendChild(h2);
  teamPanel.appendChild(buildTeamMetricsSection(DATA.games.flatMap(g => g.points)));
  if (DATA.tournamentSummaries.length) {
    const h3 = document.createElement("h3");
    h3.textContent = "By Tournament";
    h3.style.marginTop = "20px";
    teamPanel.appendChild(h3);
    const wrap = document.createElement("div");
    wrap.className = "table-wrap";
    const table = document.createElement("table");
    table.innerHTML = "<thead><tr><th>Tournament</th><th>GP</th><th>W</th><th>L</th><th>T</th><th>PF</th><th>PA</th></tr></thead>";
    const tbody = document.createElement("tbody");
    DATA.tournamentSummaries.forEach(ts => {
      const tr = document.createElement("tr");
      tr.innerHTML = "<td>" + ts.name + "</td><td>" + ts.gamesPlayed + "</td><td>" + ts.wins + "</td><td>" + ts.losses + "</td><td>" + ts.ties + "</td><td>" + ts.pointsFor + "</td><td>" + ts.pointsAgainst + "</td>";
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    teamPanel.appendChild(wrap);
  }
  panels.team = teamPanel;
  app.appendChild(teamPanel);
}

buildApp();
</script>
</body>
</html>
